<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ggnpu chat</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #1a1a1e;
      --panel: #25252b;
      --border: #3a3a44;
      --text: #e8e8ed;
      --muted: #9a9aa8;
      --accent: #6b8afd;
      --user: #2d3f6b;
      --assistant: #2a2a32;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f4f7;
        --panel: #ffffff;
        --border: #d8d8e0;
        --text: #1a1a22;
        --muted: #666678;
        --accent: #3d5fd4;
        --user: #e8eeff;
        --assistant: #f0f0f5;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header p { margin: 0.25rem 0 0; font-size: 0.85rem; color: var(--muted); }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 48rem;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 85%; }
    .msg.assistant { background: var(--assistant); align-self: flex-start; max-width: 95%; }
    .msg.system { color: var(--muted); font-size: 0.9rem; align-self: center; text-align: center; }
    .msg.error { background: #4a2020; color: #ffb4b4; align-self: stretch; }
    footer {
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 1rem;
    }
    .controls {
      max-width: 48rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    label { font-size: 0.8rem; color: var(--muted); }
    input[type="number"] {
      width: 4.5rem;
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 0.35rem;
      background: var(--bg);
      color: var(--text);
    }
    textarea {
      width: 100%;
      min-height: 3.5rem;
      max-height: 10rem;
      resize: vertical;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    button {
      padding: 0.65rem 1.25rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>ggnpu chat</h1>
    <p>Local NPU inference — each message reloads the model (prototype).</p>
  </header>

  <div id="messages">
    <div class="msg system">Send a message to start. Generation may take a while while the model loads.</div>
  </div>

  <footer>
    <div class="controls">
      <div class="row">
        <label>Max tokens <input type="number" id="maxTokens" value="128" min="1" max="2048"></label>
        <label>Temp <input type="number" id="temp" value="0.7" min="0" max="2" step="0.1"></label>
      </div>
      <textarea id="input" placeholder="Type a message…" rows="2"></textarea>
      <div class="row">
        <button id="send">Send</button>
        <button id="clear" type="button" style="background: transparent; color: var(--muted); border: 1px solid var(--border);">Clear</button>
      </div>
    </div>
  </footer>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const clearBtn = document.getElementById("clear");
    const maxTokensEl = document.getElementById("maxTokens");
    const tempEl = document.getElementById("temp");

    let history = [];
    let busy = false;

    function addMessage(role, content) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = content;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || busy) return;

      busy = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      addMessage("user", message);

      const loading = addMessage("system", "Generating… (loading model on NPU)");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            history,
            max_tokens: Number(maxTokensEl.value) || 128,
            temp: Number(tempEl.value) || 0,
          }),
        });

        const data = await res.json();
        loading.remove();

        if (!res.ok) {
          addMessage("error", data.error || "Request failed");
          return;
        }

        const reply = data.response || "(empty response)";
        addMessage("assistant", reply + (data.elapsed_s ? `\n\n(${data.elapsed_s}s)` : ""));
        history.push({ role: "user", content: message });
        history.push({ role: "assistant", content: reply });
      } catch (err) {
        loading.remove();
        addMessage("error", String(err));
      } finally {
        busy = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    clearBtn.addEventListener("click", () => {
      history = [];
      messagesEl.innerHTML = "";
      addMessage("system", "Conversation cleared.");
    });
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    inputEl.focus();
  </script>
</body>
</html>
